<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>معرض الصور</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; touch-action:none; font-family:sans-serif; }
canvas { display:block; }
.hint {
  position:fixed; bottom:20px; width:100%; text-align:center;
  color:rgba(255,255,255,0.75); font-size:14px; z-index:100;
  pointer-events:none; text-shadow:0 1px 4px #000;
}
#overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.94);
  z-index:9999; justify-content:center; align-items:center;
}
#overlay.on { display:flex; }
#overlay img {
  max-width:95vw; max-height:92vh; object-fit:contain;
  border:2px solid rgba(255,255,255,0.3); border-radius:5px;
  box-shadow:0 0 60px #000;
}
#xbtn {
  position:fixed; top:14px; left:14px; width:40px; height:40px;
  background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3);
  color:#fff; font-size:20px; border-radius:50%; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  z-index:10000;
}
</style>
</head>
<body>
<div class="hint">اسحب للدوران • اضغط الصورة للتكبير</div>
<div id="overlay" onclick="closeZ()">
  <button id="xbtn" onclick="closeZ()">✕</button>
  <img id="zimg" src="" alt="">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══════════════════════════════════════════════
//  IMAGES  (8 wall + 1 ceiling = 9 total)
// ══════════════════════════════════════════════
const WALLS = [
  "photo_2026-03-07_21-54-50.jpg",
  "photo_2026-03-07_21-54-46.jpg",
  "photo_2026-03-07_21-54-41.jpg",
  "photo_2026-03-07_21-54-29.jpg",
  "photo_2026-03-07_21-54-35.jpg",
  "photo_2026-03-07_21-54-13.jpg",
  "photo_2026-03-07_21-54-29.jpg",
  "photo_2026-03-07_21-54-35.jpg",
];
const CEIL = "photo_2026-03-07_21-54-13.jpg";

// ══════════════════════════════════════════════
//  RENDERER
// ══════════════════════════════════════════════
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0xf0ede8);

const camera = new THREE.PerspectiveCamera(75, W/H, 0.05, 100);
camera.position.set(0, 0, 0); // viewer at dead center

scene.add(new THREE.AmbientLight(0xffffff, 4.0));
scene.add(new THREE.DirectionalLight(0xffffff, 2.0));

// ══════════════════════════════════════════════
//  TEXTURE HELPER
// ══════════════════════════════════════════════
const TL = new THREE.TextureLoader();
const clickable = [];

function addTex(src, mesh) {
  TL.load(src, tex => {
    tex.encoding     = THREE.sRGBEncoding;
    tex.anisotropy   = renderer.capabilities.getMaxAnisotropy();
    tex.minFilter    = THREE.LinearMipmapLinearFilter;
    tex.magFilter    = THREE.LinearFilter;
    mesh.material.map = tex;
    mesh.material.needsUpdate = true;
  });
}

// ══════════════════════════════════════════════
//  GOLD FRAME helper
// ══════════════════════════════════════════════
function goldFrame(w, h) {
  const b = 0.06;
  const shape = new THREE.Shape();
  shape.moveTo(-w/2-b, -h/2-b);
  shape.lineTo( w/2+b, -h/2-b);
  shape.lineTo( w/2+b,  h/2+b);
  shape.lineTo(-w/2-b,  h/2+b);
  shape.closePath();
  const hole = new THREE.Path();
  hole.moveTo(-w/2, -h/2);
  hole.lineTo( w/2, -h/2);
  hole.lineTo( w/2,  h/2);
  hole.lineTo(-w/2,  h/2);
  hole.closePath();
  shape.holes.push(hole);
  return new THREE.Mesh(
    new THREE.ShapeGeometry(shape),
    new THREE.MeshBasicMaterial({ color:0xc9a840, side:THREE.DoubleSide })
  );
}

// ══════════════════════════════════════════════
//  WALL PANELS — key fix: lookAt(0,y,0) so each
//  panel naturally faces the viewer at center
// ══════════════════════════════════════════════
const R  = 4.8;   // radius of the ring
const PH = 5.0;   // panel height
const PW = 2 * R * Math.tan(Math.PI / WALLS.length); // width fills gap
const N  = WALLS.length; // 8

WALLS.forEach((src, i) => {
  const angle = (i / N) * Math.PI * 2;
  const px = Math.sin(angle) * R;
  const pz = Math.cos(angle) * R;
  const py = 1.6; // eye level center of panel

  // Blank material — texture loads async
  const mat  = new THREE.MeshBasicMaterial({ color: 0x222222, side: THREE.FrontSide });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(PW, PH), mat);

  // Position at ring edge
  mesh.position.set(px, py, pz);
  // CRITICAL: face toward center (0, py, 0)
  mesh.lookAt(0, py, 0);

  mesh.userData.src = src;
  scene.add(mesh);
  clickable.push(mesh);
  addTex(src, mesh);

  // Gold frame on top
  const frame = goldFrame(PW, PH);
  frame.position.set(px, py, pz);
  frame.lookAt(0, py, 0);
  // Push frame slightly in front
  frame.position.x += Math.sin(angle) * -0.02;
  frame.position.z += Math.cos(angle) * -0.02;
  scene.add(frame);
});

// ══════════════════════════════════════════════
//  CEILING IMAGE — 1 image flat above viewer
// ══════════════════════════════════════════════
const CS   = 3.8; // ceiling square size
const CMAT = new THREE.MeshBasicMaterial({ color:0x222222, side:THREE.FrontSide });
const CMESH = new THREE.Mesh(new THREE.PlaneGeometry(CS, CS), CMAT);
CMESH.position.set(0, PH/2 + 1.6 + 0.5, 0);
CMESH.rotation.x = Math.PI / 2; // face downward = viewer looks up
CMESH.userData.src = CEIL;
scene.add(CMESH);
clickable.push(CMESH);
addTex(CEIL, CMESH);

const cframe = goldFrame(CS, CS);
cframe.position.copy(CMESH.position);
cframe.position.y += 0.02;
cframe.rotation.x = Math.PI / 2;
scene.add(cframe);

// ══════════════════════════════════════════════
//  FLOOR
// ══════════════════════════════════════════════
const floor = new THREE.Mesh(
  new THREE.CircleGeometry(R+1, 64),
  new THREE.MeshBasicMaterial({ color:0xddd8d0 })
);
floor.rotation.x = -Math.PI/2;
floor.position.y = -PH/2 + 1.6;
scene.add(floor);

// ══════════════════════════════════════════════
//  LOOK CONTROLS
// ══════════════════════════════════════════════
let yaw=0, pitch=0, drag=false, lx=0, ly=0;
const SENS=0.003, PLIM=Math.PI/2.1;
const euler = new THREE.Euler(0,0,0,"YXZ");

function sd(x,y){ drag=true; lx=x; ly=y; }
function ed(){ drag=false; }
function mv(x,y){
  if(!drag) return;
  yaw   -= (x-lx)*SENS;
  pitch -= (y-ly)*SENS;
  pitch  = Math.max(-PLIM, Math.min(PLIM, pitch));
  lx=x; ly=y;
}

renderer.domElement.addEventListener("mousedown",  e=>sd(e.clientX,e.clientY));
window.addEventListener("mouseup",   ed);
window.addEventListener("mousemove", e=>mv(e.clientX,e.clientY));

let tm=false;
renderer.domElement.addEventListener("touchstart", e=>{
  tm=false; sd(e.touches[0].clientX,e.touches[0].clientY);
},{passive:true});
window.addEventListener("touchmove", e=>{
  tm=true; mv(e.touches[0].clientX,e.touches[0].clientY);
},{passive:true});
window.addEventListener("touchend", e=>{
  ed();
  if(!tm){
    const t=e.changedTouches[0];
    tap(t.clientX, t.clientY);
  }
},{passive:true});

// ══════════════════════════════════════════════
//  CLICK/TAP ZOOM
// ══════════════════════════════════════════════
const rc=new THREE.Raycaster(), pt=new THREE.Vector2();

function tap(cx,cy){
  pt.x=(cx/window.innerWidth)*2-1;
  pt.y=-(cy/window.innerHeight)*2+1;
  rc.setFromCamera(pt, camera);
  const hits=rc.intersectObjects(clickable);
  if(hits.length) openZ(hits[0].object.userData.src);
}
renderer.domElement.addEventListener("click", e=>{
  if(e.pointerType!=="touch") tap(e.clientX,e.clientY);
});

function openZ(src){
  const img=document.getElementById("zimg");
  img.style.opacity="0";
  document.getElementById("overlay").classList.add("on");
  const tmp=new Image();
  tmp.onload=()=>{ img.src=src; img.style.transition="opacity 0.3s"; img.style.opacity="1"; };
  tmp.src=src;
}
function closeZ(){
  document.getElementById("overlay").classList.remove("on");
}
window.closeZ=closeZ;


// ══════════════════════════════════════════════
//  GYROSCOPE (mobile device orientation)
// ══════════════════════════════════════════════
let gyroEnabled = false;
let alphaOffset = null;

function enableGyro() {
  window.addEventListener("deviceorientation", e => {
    if (!e.alpha && !e.beta && !e.gamma) return;
    gyroEnabled = true;
    if (alphaOffset === null) alphaOffset = e.alpha;
    const a = THREE.MathUtils.degToRad(e.alpha - alphaOffset);
    const b = THREE.MathUtils.degToRad(e.beta  - 90);
    yaw   = -a;
    pitch = -b;
    pitch = Math.max(-PLIM, Math.min(PLIM, pitch));
  }, true);
}

if (typeof DeviceOrientationEvent !== "undefined" &&
    typeof DeviceOrientationEvent.requestPermission === "function") {
  // iOS 13+ needs permission
  const btn = document.createElement("button");
  btn.textContent = "🔄 تفعيل الجيروسكوب";
  btn.style.cssText = "position:fixed;top:14px;right:14px;z-index:200;padding:8px 14px;border-radius:20px;border:none;background:rgba(0,0,0,0.6);color:#fff;font-size:13px;cursor:pointer;";
  btn.onclick = () => {
    DeviceOrientationEvent.requestPermission().then(r => {
      if (r === "granted") { enableGyro(); btn.remove(); }
    });
  };
  document.body.appendChild(btn);
} else {
  enableGyro();
}
// ══════════════════════════════════════════════
//  RESIZE
// ══════════════════════════════════════════════
window.addEventListener("resize",()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ══════════════════════════════════════════════
//  RENDER LOOP
// ══════════════════════════════════════════════
function loop(){
  requestAnimationFrame(loop);
  euler.set(pitch,yaw,0);
  camera.quaternion.setFromEuler(euler);
  renderer.render(scene,camera);
}
loop();
</script>
</body>
</html>
