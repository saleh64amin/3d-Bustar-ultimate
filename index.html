<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>معرض الصور</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>
html,body{
margin:0;
overflow:hidden;
touch-action:none;
}

a-scene{
touch-action:none;
}

#fullscreen-zoom{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
z-index:9999;
justify-content:center;
align-items:center;
}

#fullscreen-zoom img{
max-width:95%;
max-height:95%;
border:2px solid white;
}

.instruction{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
color:white;
font-family:sans-serif;
z-index:100;
}
</style>

<script>

AFRAME.registerComponent('zoom-logic',{
init:function(){

const overlay=document.getElementById("fullscreen-zoom");
const zoomImg=overlay.querySelector("img");

this.el.addEventListener("click",()=>{

zoomImg.src=this.el.getAttribute("src");
overlay.style.display="flex";

});

}
});

function closeZoom(){
document.getElementById("fullscreen-zoom").style.display="none";
}

/* إصلاح مشكلة Chrome */
document.addEventListener("DOMContentLoaded",function(){

document.addEventListener("touchmove",function(e){

if(e.target.closest("a-scene")){
e.preventDefault();
}

},{passive:false});

});

</script>

</head>

<body>

<div class="instruction">
اسحب الشاشة للتحرك — اضغط الصورة للتكبير
</div>

<div id="fullscreen-zoom" onclick="closeZoom()">
<img src="">
</div>

<a-scene vr-mode-ui="enabled:false">

<a-sky color="#556B2F"></a-sky>

<a-entity light="type:ambient;intensity:1.5"></a-entity>

<!-- 8 images around -->

<a-image zoom-logic src="photo_2026-03-07_21-54-13.jpg" position="0 1.6 -5" width="3.5" height="3.5"></a-image>

<a-image zoom-logic src="photo_2026-03-07_21-54-29.jpg" position="3.5 1.6 -3.5" rotation="0 -45 0" width="3.5" height="3.5"></a-image>

<a-image zoom-logic src="photo_2026-03-07_21-54-35.jpg" position="5 1.6 0" rotation="0 -90 0" width="3.5" height="3.5"></a-image>

<a-image zoom-logic src="photo_2026-03-07_21-54-41.jpg" position="3.5 1.6 3.5" rotation="0 -135 0" width="3.5" height="3.5"></a-image>

<a-image zoom-logic src="photo_2026-03-07_21-54-46.jpg" position="0 1.6 5" rotation="0 180 0" width="3.5" height="3.5"></a-image>

<a-image zoom-logic src="photo_2026-03-07_21-54-50.jpg" position="-3.5 1.6 3.5" rotation="0 135 0" width="3.5" height="3.5"></a-image>

<a-image zoom-logic src="photo_2026-03-07_21-54-13.jpg" position="-5 1.6 0" rotation="0 90 0" width="3.5" height="3.5"></a-image>

<a-image zoom-logic src="photo_2026-03-07_21-54-29.jpg" position="-3.5 1.6 -3.5" rotation="0 45 0" width="3.5" height="3.5"></a-image>

<!-- image above -->

<a-image zoom-logic src="photo_2026-03-07_21-54-35.jpg" position="0 6 0" rotation="90 0 0" width="4" height="4"></a-image>

<a-entity camera
look-controls="touchEnabled:true; magicWindowTrackingEnabled:true"
position="0 1.6 0">

<a-entity
cursor="fuse:false; rayOrigin:entity"
raycaster="objects:a-image"></a-entity>

</a-entity>

</a-scene>

</body>
</html>
