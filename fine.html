<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>معرض الصور</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; touch-action:none; background:#fff; }
canvas { display:block; }

.hint {
  position:fixed; bottom:20px; width:100%; text-align:center;
  color:#333; font-family:sans-serif; font-size:14px;
  z-index:100; pointer-events:none;
  text-shadow: 0 1px 3px rgba(255,255,255,0.8);
}

#fullscreen-zoom {
  display:none;
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.92);
  z-index:9999;
  justify-content:center;
  align-items:center;
}
#fullscreen-zoom img {
  max-width:95%;
  max-height:95%;
  border:2px solid white;
  object-fit:contain;
  display:block;
}
</style>
</head>
<body>

<div class="hint">اسحب للدوران • اضغط الصورة للتكبير</div>

<div id="fullscreen-zoom" onclick="closeZoom()">
  <img id="zoom-img" src="" alt="">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ══════ IMAGES ══════
const PANELS = [
  { src:"photo_2026-03-08_11-37-57.jpg", pos:[0,    1.6,-3.7], rotY:0    },
  { src:"photo_2026-03-07_21-54-46.jpg", pos:[2.6,  1.6,-2.6], rotY:-45  },
  { src:"photo_2026-03-07_21-54-41.jpg", pos:[3.7,  1.6, 0  ], rotY:-90  },
  { src:"photo_2026-03-07_21-54-29.jpg", pos:[2.6,  1.6, 2.6], rotY:-135 },
  { src:"photo_2026-03-07_21-54-35.jpg", pos:[0,    1.6, 3.7], rotY:180  },
  { src:"photo_2026-03-07_21-54-13.jpg", pos:[-2.6, 1.6, 2.6], rotY:135  },
  { src:"photo_2026-03-07_21-54-29.jpg", pos:[-3.7, 1.6, 0  ], rotY:90   },
  { src:"photo_2026-03-07_21-54-35.jpg", pos:[-2.6, 1.6,-2.6], rotY:45   },
];
const CEILING = { src:"photo_2026-03-07_21-54-13.jpg", pos:[0, 6, 0], rotX:90 };

// ══════ RENDERER ══════
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x556B2F);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.05, 100);
camera.position.set(0, 1.6, 0);

scene.add(new THREE.AmbientLight(0xffffff, 3.5));

// ══════ TEXTURES ══════
const TL = new THREE.TextureLoader();
const clickable = [];

function makeMesh(src, w, h) {
  const mat  = new THREE.MeshBasicMaterial({ color:0xffffff });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
  mesh.userData.src = src;
  TL.load(src, tex => {
    tex.encoding   = THREE.sRGBEncoding;
    tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
    tex.minFilter  = THREE.LinearMipmapLinearFilter;
    tex.magFilter  = THREE.LinearFilter;
    mat.map = tex;
    mat.needsUpdate = true;
  });
  clickable.push(mesh);
  return mesh;
}

PANELS.forEach(p => {
  const mesh = makeMesh(p.src, 2.8, 2.8);
  mesh.position.set(...p.pos);
  mesh.rotation.y = THREE.MathUtils.degToRad(p.rotY);
  scene.add(mesh);
});

const ceil = makeMesh(CEILING.src, 4, 4);
ceil.position.set(...CEILING.pos);
ceil.rotation.x = THREE.MathUtils.degToRad(CEILING.rotX);
scene.add(ceil);

// ══════ DRAG CONTROLS ══════
let yaw=0, pitch=0;
let dragging=false, lx=0, ly=0;
const SENS = 0.003;
const PLIM = Math.PI / 2.1;
const euler = new THREE.Euler(0,0,0,"YXZ");

function startDrag(x,y){ dragging=true; lx=x; ly=y; }
function stopDrag(){ dragging=false; }
function onDrag(x,y){
  if(!dragging) return;
  yaw   += (x-lx)*SENS;
  pitch -= (y-ly)*SENS;
  pitch  = Math.max(-PLIM, Math.min(PLIM, pitch));
  lx=x; ly=y;
}

renderer.domElement.addEventListener("mousedown",  e=>startDrag(e.clientX,e.clientY));
window.addEventListener("mouseup",   stopDrag);
window.addEventListener("mousemove", e=>onDrag(e.clientX,e.clientY));

// ══════ TOUCH ══════
let touchStartX=0, touchStartY=0, touchMoved=false;

renderer.domElement.addEventListener("touchstart", e=>{
  e.preventDefault();
  touchMoved  = false;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  startDrag(touchStartX, touchStartY);
}, { passive:false });

renderer.domElement.addEventListener("touchmove", e=>{
  e.preventDefault();
  const dx = Math.abs(e.touches[0].clientX - touchStartX);
  const dy = Math.abs(e.touches[0].clientY - touchStartY);
  if(dx > 5 || dy > 5) touchMoved = true;
  onDrag(e.touches[0].clientX, e.touches[0].clientY);
}, { passive:false });

renderer.domElement.addEventListener("touchend", e=>{
  e.preventDefault();
  stopDrag();
  if(!touchMoved){
    const t = e.changedTouches[0];
    doRaycast(t.clientX, t.clientY);
  }
}, { passive:false });

// ══════ GYROSCOPE — نفس منطق A-Frame magicWindowTrackingEnabled ══════
// المتغيرات
const _q        = new THREE.Quaternion();
const _qScreen  = new THREE.Quaternion(); // تصحيح اتجاه الشاشة
const _euler    = new THREE.Euler();
// تصحيح المحور: شاشة عمودية = دوران -90 حول X
_qScreen.setFromAxisAngle(new THREE.Vector3(1,0,0), -Math.PI/2);

let _qBase = null;  // نقطة البداية (الصفر)
let gyroOn = false;

function onDeviceOrientation(e){
  if(e.alpha === null || e.beta === null || e.gamma === null) return;

  // نفس A-Frame: بناء quaternion من زوايا الجهاز
  _euler.set(
    THREE.MathUtils.degToRad(e.beta),
    THREE.MathUtils.degToRad(e.alpha),
    -THREE.MathUtils.degToRad(e.gamma),
    "YXZ"
  );
  _q.setFromEuler(_euler);

  // تصحيح اتجاه الشاشة (نفس ما يفعله A-Frame)
  _q.multiply(_qScreen);

  // أول قراءة = نقطة الصفر
  if(_qBase === null){
    _qBase = _q.clone().invert();
  }

  // الدوران النسبي
  const relQ = _qBase.clone().premultiply(_q);

  // استخرج yaw و pitch من الـ quaternion
  const m  = new THREE.Matrix4().makeRotationFromQuaternion(relQ);
  const eu = new THREE.Euler().setFromRotationMatrix(m, "YXZ");

  yaw   = eu.y;
  pitch = Math.max(-PLIM, Math.min(PLIM, eu.x));
  gyroOn = true;
}

if(typeof DeviceOrientationEvent !== "undefined"){
  if(typeof DeviceOrientationEvent.requestPermission === "function"){
    // iOS 13+
    const btn = document.createElement("button");
    btn.textContent = "🔄 تفعيل الجيروسكوب";
    btn.style.cssText = "position:fixed;top:14px;right:14px;z-index:200;padding:10px 16px;border-radius:20px;border:none;background:rgba(0,0,0,0.55);color:#fff;font-size:14px;cursor:pointer;";
    btn.onclick = ()=>{
      DeviceOrientationEvent.requestPermission().then(r=>{
        if(r==="granted"){
          window.addEventListener("deviceorientation", onDeviceOrientation, true);
          btn.remove();
        }
      });
    };
    document.body.appendChild(btn);
  } else {
    // Android Chrome — مباشرة بدون إذن
    window.addEventListener("deviceorientation", onDeviceOrientation, true);
  }
}

// ══════ RAYCAST / ZOOM ══════
const rc = new THREE.Raycaster();
const pt = new THREE.Vector2();

function doRaycast(cx, cy){
  pt.x =  (cx / window.innerWidth)  * 2 - 1;
  pt.y = -(cy / window.innerHeight) * 2 + 1;
  rc.setFromCamera(pt, camera);
  const hits = rc.intersectObjects(clickable);
  if(hits.length > 0) openZoom(hits[0].object.userData.src);
}

renderer.domElement.addEventListener("click", e=>{
  if(e.pointerType === "touch") return;
  doRaycast(e.clientX, e.clientY);
});

function openZoom(src){
  document.getElementById("zoom-img").src = src;
  document.getElementById("fullscreen-zoom").style.display = "flex";
}
function closeZoom(){
  document.getElementById("fullscreen-zoom").style.display = "none";
}
window.closeZoom = closeZoom;

// ══════ RESIZE ══════
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ══════ RENDER LOOP ══════
function loop(){
  requestAnimationFrame(loop);
  euler.set(pitch, yaw, 0);
  camera.quaternion.setFromEuler(euler);
  renderer.render(scene, camera);
}
loop();

</script>
</body>
</html>
